name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # let Windows finish even if Ubuntu fails, and vice versa
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22   # LTS — avoids Node 20 deprecation warnings

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Install npm dependencies
        run: npm install

      - name: Create config.js from secrets
        # Avoid template literals / backticks — bash treats them as command substitution
        run: node -e "var fs=require('fs'),u=process.env.SB_URL,k=process.env.SB_KEY;fs.writeFileSync('config.js','module.exports={supabaseUrl:\"'+u+'\",supabaseKey:\"'+k+'\"};');"
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run release
